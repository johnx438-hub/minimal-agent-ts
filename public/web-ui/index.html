<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent WebUI · minimal-agent-ts</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
  :root {
    --bg-0: #0a0e14; --bg-1: #0d1117; --panel: #11161f; --panel-2: #161d29;
    --border: #1f2733; --text: #e6edf3; --text-dim: #8b949e; --accent: #22d3ee;
    --green: #3fb950; --red: #f85149; --warn: #d29922;
    --mono: "SFMono-Regular", Consolas, Menlo, monospace;
    --sans: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: var(--bg-0); color: var(--text); font-family: var(--sans); overflow: hidden; }
  #bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(rgba(34,211,238,1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,1) 1px, transparent 1px);
    background-size: 40px 40px; opacity: 0.05;
  }
  #bg-glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 65% 45% at 50% -5%, rgba(34,211,238,0.08), transparent 70%);
  }
  /* rows: optional banners (display:none 不占位) · status · main · input */
  #app {
    position: relative; z-index: 1; height: 100vh; width: 100%;
    display: grid;
    grid-template-rows: auto auto auto minmax(0, 1fr) auto;
    grid-template-columns: minmax(0, 1fr);
    overflow: hidden;
  }
  #banner-token {
    display: none; padding: 8px 16px; background: rgba(248,81,73,0.12);
    border-bottom: 1px solid var(--red); font-size: 12px;
  }
  #banner-token.show { display: block; }
  #armed-bar {
    display: none; padding: 6px 16px; background: rgba(210,153,34,0.12);
    border-bottom: 1px solid var(--warn); font-size: 12px; color: var(--warn);
    align-items: center; gap: 10px;
  }
  #armed-bar.show { display: flex; }
  #armed-bar button {
    margin-left: auto; background: transparent; border: 1px solid var(--warn);
    color: var(--warn); border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 11px;
  }
  #statusbar {
    display: flex; align-items: center; gap: 12px; padding: 8px 12px;
    min-height: 46px;
    background: rgba(17,22,31,0.92); border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--text-dim); flex-wrap: wrap;
  }
  #statusbar .brand { font-family: var(--mono); font-weight: 700; color: var(--accent); }
  #statusbar .tag { font-size: 10px; padding: 1px 6px; border: 1px solid var(--border); border-radius: 10px; }
  #statusbar .stat b { color: var(--text); font-family: var(--mono); margin-left: 3px; }
  #statusbar .spacer { flex: 1; }
  #statusbar select {
    background: var(--bg-1); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 6px; font-size: 11px; max-width: 140px;
  }
  #statusbar select:disabled { opacity: 0.45; }
  #statusbar .conn { display: flex; align-items: center; gap: 6px; }
  #statusbar .conn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px rgba(63,185,80,0.9); }
  #btn-abort {
    display: none; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--red);
    background: transparent; color: var(--red); cursor: pointer; font-size: 12px;
  }
  /* min-width:0 防止中间气泡把侧栏挤没 / 盖住 */
  #main {
    display: flex; flex-direction: row; align-items: stretch;
    min-height: 0; min-width: 0; overflow: hidden; width: 100%;
  }
  #stream {
    flex: 1 1 0%;
    min-width: 0;
    min-height: 0;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 16px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { display: flex; animation: fade-in 0.2s ease; max-width: 100%; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  .msg .bubble {
    max-width: min(78%, 100%); padding: 10px 14px; border-radius: 10px; background: var(--panel);
    border: 1px solid var(--border); font-size: 14px; line-height: 1.65;
    word-break: break-word; overflow-wrap: anywhere;
  }
  .msg.user { justify-content: flex-end; }
  .msg.user .bubble { background: var(--panel-2); border-right: 3px solid var(--accent); white-space: pre-wrap; }
  .msg.assistant { justify-content: flex-start; }
  .msg.assistant .bubble { border-left: 3px solid var(--green); }
  .msg.system .bubble { border-left: 3px solid var(--warn); color: var(--text-dim); font-size: 13px; white-space: pre-wrap; }
  .cursor { color: var(--accent); font-family: var(--mono); animation: blink 0.9s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  /* Markdown */
  .md { white-space: normal; }
  .md p { margin: 0.4em 0; }
  .md h1,.md h2,.md h3 { margin: 0.6em 0 0.35em; line-height: 1.3; }
  .md h1 { font-size: 1.25em; } .md h2 { font-size: 1.12em; } .md h3 { font-size: 1.05em; }
  .md ul,.md ol { margin: 0.35em 0 0.35em 1.3em; }
  .md code {
    font-family: var(--mono); font-size: 0.9em; background: var(--bg-1);
    padding: 0.1em 0.35em; border-radius: 4px; border: 1px solid var(--border);
  }
  .md pre {
    margin: 0.5em 0; padding: 10px 12px; overflow-x: auto; background: var(--bg-1);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .md pre code { background: none; border: none; padding: 0; font-size: 12px; line-height: 1.5; }
  .md blockquote { margin: 0.4em 0; padding-left: 10px; border-left: 3px solid var(--border); color: var(--text-dim); }
  .md table { border-collapse: collapse; margin: 0.5em 0; font-size: 13px; }
  .md th,.md td { border: 1px solid var(--border); padding: 4px 8px; }
  .md a { color: var(--accent); }
  .msg.tool .bubble { padding: 0; width: min(640px,100%); max-width: 100%; background: transparent; border: none; }
  .tool-card { border: 1px solid var(--border); border-radius: 8px; background: var(--panel); overflow: hidden; }
  .tool-head {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer;
    font-family: var(--mono); font-size: 13px; color: var(--accent);
  }
  .tool-head:hover { background: rgba(34,211,238,0.06); }
  .tool-toggle { color: var(--text-dim); transition: transform 0.15s; }
  .tool-card.open .tool-toggle { transform: rotate(90deg); }
  .tool-state { margin-left: auto; font-size: 11px; color: var(--green); }
  .tool-body { display: none; border-top: 1px solid var(--border); padding: 10px 12px; }
  .tool-card.open .tool-body { display: block; }
  .tool-section { font-size: 11px; color: var(--text-dim); margin: 6px 0 4px; }
  .tool-json {
    font-family: var(--mono); font-size: 12px; line-height: 1.5; color: var(--text-dim);
    background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; white-space: pre-wrap; word-break: break-all;
  }
  #side {
    flex: 0 0 300px;
    width: 300px;
    min-width: 300px;
    max-width: 300px;
    border-left: 1px solid var(--border);
    background: rgba(17, 22, 31, 0.98);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    position: relative;
    z-index: 2;
  }
  .side-tabs {
    display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border);
    flex-shrink: 0; background: rgba(17, 22, 31, 0.98);
  }
  .side-tab {
    flex: 1 1 20%; min-width: 52px; padding: 8px 4px; font-size: 10px; letter-spacing: 0.3px;
    background: transparent; border: none; border-bottom: 2px solid transparent;
    color: var(--text-dim); cursor: pointer; font-family: var(--sans);
  }
  .side-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .side-panel {
    flex: 1 1 0%;
    min-height: 0;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 10px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .side-panel.active { display: flex; }
  .side-empty { text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 16px; }
  .job,.wf-step,.sess-item,.cat-item {
    border: 1px solid var(--border); border-left-width: 3px; border-radius: 8px;
    background: var(--panel-2); padding: 8px 10px;
  }
  .job[data-status="running"],.wf-step[data-status="running"] { border-left-color: var(--accent); }
  .job[data-status="done"],.wf-step[data-status="done"] { border-left-color: var(--green); }
  .job[data-status="failed"] { border-left-color: var(--red); }
  .cat-item { border-left-color: var(--border); cursor: pointer; }
  .cat-item:hover { border-color: var(--accent); }
  .cat-item .row { display: flex; justify-content: space-between; gap: 6px; align-items: center; }
  .cat-item .meta { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .cat-item button {
    font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--accent);
    background: transparent; color: var(--accent); cursor: pointer;
  }
  .sess-item { cursor: pointer; border-left-color: var(--border); }
  .sess-item.active { border-left-color: var(--accent); background: rgba(34,211,238,0.06); }
  .job-top,.wf-top,.sess-top { display: flex; justify-content: space-between; gap: 8px; }
  .job-label,.wf-label,.sess-label { font-size: 13px; }
  .job-id,.wf-meta,.sess-meta { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .badge { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .job[data-status="running"] .badge,.wf-step[data-status="running"] .badge {
    background: var(--accent); color: #062a30; animation: pulse 1.2s ease-in-out infinite;
  }
  .job[data-status="done"] .badge,.wf-step[data-status="done"] .badge { background: var(--green); color: #06210f; }
  @keyframes pulse { 50% { opacity: 0.45; } }
  #inputbar {
    display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px;
    background: rgba(17,22,31,0.92); border-top: 1px solid var(--border);
    min-width: 0; z-index: 2;
  }
  #chips { display: none; }
  #input {
    flex: 1; resize: none; background: var(--bg-1); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 14px;
    line-height: 1.5; padding: 9px 12px; outline: none; max-height: 120px;
  }
  #input:focus { border-color: var(--accent); }
  #send {
    padding: 9px 18px; font-size: 14px; font-weight: 600; color: #062a30;
    background: var(--accent); border: none; border-radius: 8px; cursor: pointer;
  }
  #send:disabled { opacity: 0.45; cursor: not-allowed; }
  #stream::-webkit-scrollbar,.side-panel::-webkit-scrollbar { width: 8px; }
  #stream::-webkit-scrollbar-thumb,.side-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
  <div id="bg-grid"></div>
  <div id="bg-glow"></div>
  <div id="app">
    <div id="banner-token">未检测到 token。请用启动日志里的完整 URL（含 ?token=）打开。</div>
    <div id="armed-bar"><span id="armed-label">Workflow armed</span><button type="button" id="btn-disarm">取消武装</button></div>
    <header id="statusbar">
      <span class="brand">◈ Agent WebUI</span>
      <span class="tag">W3</span>
      <label>Profile <select id="sel-profile" title="api profile"></select></label>
      <label>Model <select id="sel-model" title="model"></select></label>
      <span class="stat">会话<b id="st-session">—</b></span>
      <span class="stat">状态<b id="st-run">idle</b></span>
      <span class="stat">轮次<b id="st-turn">0</b></span>
      <span class="spacer"></span>
      <button type="button" id="btn-abort">中止</button>
      <span class="conn"><span class="dot" id="conn-dot"></span><span id="conn-label">连接中…</span></span>
    </header>
    <div id="main">
      <div id="stream"></div>
      <aside id="side">
        <div class="side-tabs">
          <button type="button" class="side-tab active" data-tab="wf">Steps</button>
          <button type="button" class="side-tab" data-tab="jobs">Jobs</button>
          <button type="button" class="side-tab" data-tab="sess">Sess</button>
          <button type="button" class="side-tab" data-tab="flows">Flows</button>
          <button type="button" class="side-tab" data-tab="skills">Skills</button>
        </div>
        <div class="side-panel active" id="panel-wf"></div>
        <div class="side-panel" id="panel-jobs"></div>
        <div class="side-panel" id="panel-sess"></div>
        <div class="side-panel" id="panel-flows"></div>
        <div class="side-panel" id="panel-skills"></div>
      </aside>
    </div>
    <footer id="inputbar">
      <textarea id="input" rows="1" placeholder="消息… 或以 / 开头（/profile /workflow /skills）"></textarea>
      <button id="send">发送</button>
    </footer>
  </div>
<script>
(function () {
  'use strict';
  if (window.marked) {
    marked.setOptions({ gfm: true, breaks: true });
  }
  var stream = document.getElementById('stream');
  var panels = {
    wf: document.getElementById('panel-wf'),
    jobs: document.getElementById('panel-jobs'),
    sess: document.getElementById('panel-sess'),
    flows: document.getElementById('panel-flows'),
    skills: document.getElementById('panel-skills')
  };
  var input = document.getElementById('input');
  var sendBtn = document.getElementById('send');
  var abortBtn = document.getElementById('btn-abort');
  var selProfile = document.getElementById('sel-profile');
  var selModel = document.getElementById('sel-model');
  var armedBar = document.getElementById('armed-bar');
  var armedLabel = document.getElementById('armed-label');
  var params = new URLSearchParams(location.search);
  var token = params.get('token') || localStorage.getItem('minimal_web_token') || '';
  if (params.get('token')) localStorage.setItem('minimal_web_token', token);
  if (!token) document.getElementById('banner-token').classList.add('show');

  var state = { turn: 0, model: '—', profile: '—', run: 'idle', sessionId: null, armed: null };
  var jobs = new Map();
  var sessions = [];
  var workflows = [];
  var skills = [];
  var loadedSkills = [];
  var wfSteps = [];
  var currentAssistant = null;
  var mdTimer = null;
  var running = false;
  var ws = null;
  var reconnectMs = 1500;
  var suppressLlmChange = false;

  var STATUS_TEXT = { running: '运行中', done: '完成', failed: '失败', error: '错误', pending: '待定' };

  function shortId(id) {
    if (!id) return '—';
    return id.length > 16 ? id.slice(0, 8) + '…' + id.slice(-4) : id;
  }
  function updateStatus() {
    document.getElementById('st-session').textContent = shortId(state.sessionId);
    document.getElementById('st-run').textContent = state.run;
    document.getElementById('st-turn').textContent = String(state.turn);
    abortBtn.style.display = running ? 'inline-block' : 'none';
    sendBtn.disabled = running || !token;
    selProfile.disabled = running || !token;
    selModel.disabled = running || !token;
    if (state.armed) {
      armedBar.classList.add('show');
      armedLabel.textContent = 'Workflow armed: ' + state.armed + ' — 下一条消息作为任务';
    } else {
      armedBar.classList.remove('show');
    }
  }
  function setConn(ok, label) {
    var d = document.getElementById('conn-dot');
    d.style.background = ok ? 'var(--green)' : 'var(--red)';
    document.getElementById('conn-label').textContent = label;
  }
  function scrollToBottom() { stream.scrollTop = stream.scrollHeight; }
  function renderMd(text) {
    var raw = text == null ? '' : String(text);
    if (!window.marked || !window.DOMPurify) {
      var esc = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<div class="md">' + esc.replace(/\n/g,'<br>') + '</div>';
    }
    var html = marked.parse(raw);
    return '<div class="md">' + DOMPurify.sanitize(html) + '</div>';
  }
  function finalizeAssistant() {
    if (mdTimer) { clearTimeout(mdTimer); mdTimer = null; }
    if (currentAssistant) {
      var t = currentAssistant.textEl.textContent || '';
      if (currentAssistant.mode === 'stream') {
        currentAssistant.bubble.innerHTML = renderMd(t);
      }
      if (currentAssistant.cursor && currentAssistant.cursor.parentNode) currentAssistant.cursor.remove();
      currentAssistant = null;
    }
  }
  function appendMessage(role, content, asMd) {
    finalizeAssistant();
    var el = document.createElement('div');
    el.className = 'msg ' + role;
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'assistant' && asMd !== false) {
      bubble.innerHTML = renderMd(content);
    } else {
      bubble.textContent = content == null ? '' : String(content);
    }
    if (role === 'assistant' && asMd === 'stream') {
      bubble.textContent = '';
      var textEl = document.createElement('span');
      textEl.className = 'text';
      textEl.textContent = content == null ? '' : String(content);
      var cursor = document.createElement('span');
      cursor.className = 'cursor';
      cursor.textContent = '▍';
      bubble.appendChild(textEl);
      bubble.appendChild(cursor);
      currentAssistant = { bubble: bubble, textEl: textEl, cursor: cursor, mode: 'stream' };
    }
    el.appendChild(bubble);
    stream.appendChild(el);
    scrollToBottom();
    return el;
  }
  function appendSystem(text) {
    finalizeAssistant();
    var el = document.createElement('div');
    el.className = 'msg system';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    el.appendChild(bubble);
    stream.appendChild(el);
    scrollToBottom();
  }
  function appendToken(delta) {
    if (!currentAssistant || currentAssistant.mode !== 'stream') {
      appendMessage('assistant', '', 'stream');
    }
    currentAssistant.raw = (currentAssistant.raw || '') + delta;
    if (currentAssistant.textEl) currentAssistant.textEl.textContent = currentAssistant.raw;
    if (mdTimer) clearTimeout(mdTimer);
    mdTimer = setTimeout(function () {
      if (!currentAssistant || currentAssistant.mode !== 'stream') return;
      var t = currentAssistant.raw || '';
      var cur = currentAssistant.cursor;
      currentAssistant.bubble.innerHTML = renderMd(t);
      var hold = document.createElement('span');
      hold.className = 'text';
      hold.style.display = 'none';
      hold.textContent = t;
      currentAssistant.bubble.appendChild(hold);
      currentAssistant.textEl = hold;
      if (cur) currentAssistant.bubble.appendChild(cur);
    }, 140);
    scrollToBottom();
  }
  finalizeAssistant = function () {
    if (mdTimer) { clearTimeout(mdTimer); mdTimer = null; }
    if (currentAssistant) {
      var t = currentAssistant.raw != null
        ? currentAssistant.raw
        : (currentAssistant.textEl ? currentAssistant.textEl.textContent : '');
      currentAssistant.bubble.innerHTML = renderMd(t || '');
      currentAssistant = null;
    }
  };

  function previewJson(obj) {
    var s;
    try { s = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2); }
    catch (e) { s = String(obj); }
    var lines = String(s).split('\n');
    return lines.length > 4 ? lines.slice(0, 4).join('\n') + '\n…' : s;
  }
  function showToolCall(call) {
    finalizeAssistant();
    var el = document.createElement('div');
    el.className = 'msg tool';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    var card = document.createElement('div');
    card.className = 'tool-card';
    var head = document.createElement('div');
    head.className = 'tool-head';
    head.innerHTML = '<span class="tool-toggle">▸</span><span class="tool-name"></span><span class="tool-state">✓</span>';
    head.querySelector('.tool-name').textContent = '⚙ ' + (call && call.name ? call.name : 'tool');
    var body = document.createElement('div');
    body.className = 'tool-body';
    body.innerHTML = '<div class="tool-section">ARGS</div><pre class="tool-json"></pre><div class="tool-section">RESULT</div><pre class="tool-json"></pre>';
    var pres = body.querySelectorAll('pre');
    pres[0].textContent = previewJson(call && call.args);
    pres[1].textContent = previewJson(call && (call.result !== undefined ? call.result : call.content));
    head.addEventListener('click', function () { card.classList.toggle('open'); });
    card.appendChild(head);
    card.appendChild(body);
    bubble.appendChild(card);
    el.appendChild(bubble);
    stream.appendChild(el);
    scrollToBottom();
  }

  function authHeaders() {
    var h = { 'Content-Type': 'application/json' };
    if (token) h['Authorization'] = 'Bearer ' + token;
    return h;
  }
  function apiUrl(path) {
    if (!token) return path;
    return path + (path.indexOf('?') >= 0 ? '&' : '?') + 'token=' + encodeURIComponent(token);
  }
  async function api(path, opts) {
    var res = await fetch(apiUrl(path), opts);
    var data = await res.json().catch(function () { return {}; });
    if (!res.ok) throw new Error(data.error || data.message || data.detail || ('HTTP ' + res.status));
    return data;
  }

  function fillProfiles(list) {
    suppressLlmChange = true;
    selProfile.innerHTML = '';
    (list || []).forEach(function (p) {
      var o = document.createElement('option');
      o.value = p.name;
      o.textContent = (p.displayName || p.name) + (p.available === false ? ' (n/a)' : '');
      o.disabled = p.available === false;
      if (p.active) o.selected = true;
      selProfile.appendChild(o);
    });
    suppressLlmChange = false;
  }
  function fillModels(list) {
    suppressLlmChange = true;
    selModel.innerHTML = '';
    (list || []).forEach(function (m) {
      var o = document.createElement('option');
      o.value = m.model;
      o.textContent = m.model;
      if (m.active) o.selected = true;
      selModel.appendChild(o);
    });
    if (!selModel.options.length) {
      var o = document.createElement('option');
      o.textContent = state.model || '—';
      o.value = state.model || '';
      selModel.appendChild(o);
    }
    suppressLlmChange = false;
  }

  function renderJobs() {
    panels.jobs.innerHTML = '';
    if (!jobs.size) { panels.jobs.innerHTML = '<div class="side-empty">暂无 jobs</div>'; return; }
    jobs.forEach(function (j) {
      var el = document.createElement('div');
      el.className = 'job';
      el.dataset.status = j.status;
      el.innerHTML = '<div class="job-top"><span class="job-label"></span><span class="badge"></span></div><div class="job-id"></div>';
      el.querySelector('.job-label').textContent = j.label || j.id;
      el.querySelector('.badge').textContent = STATUS_TEXT[j.status] || j.status;
      el.querySelector('.job-id').textContent = j.id;
      panels.jobs.appendChild(el);
    });
  }
  function renderWorkflowSteps() {
    panels.wf.innerHTML = '';
    if (!wfSteps.length) {
      panels.wf.innerHTML = '<div class="side-empty">Workflow 步骤会显示在这里</div>';
      return;
    }
    wfSteps.forEach(function (s, i) {
      var el = document.createElement('div');
      el.className = 'wf-step';
      el.dataset.status = s.status || 'pending';
      var title = s.nodeId || s.as || s.role;
      el.innerHTML = '<div class="wf-top"><span class="wf-label"></span><span class="badge"></span></div><div class="wf-meta"></div>';
      el.querySelector('.wf-label').textContent = (i + 1) + '. ' + title;
      el.querySelector('.badge').textContent = STATUS_TEXT[s.status] || s.status;
      el.querySelector('.wf-meta').textContent = (s.phase || '') + (s.round != null ? ' · r' + s.round : '');
      panels.wf.appendChild(el);
    });
  }
  function renderSessions() {
    panels.sess.innerHTML = '';
    if (!sessions.length) { panels.sess.innerHTML = '<div class="side-empty">暂无会话</div>'; return; }
    sessions.forEach(function (s) {
      var el = document.createElement('div');
      el.className = 'sess-item' + (s.session_id === state.sessionId ? ' active' : '');
      el.innerHTML = '<div class="sess-top"><span class="sess-label"></span></div><div class="sess-meta"></div>';
      el.querySelector('.sess-label').textContent = s.note || s.session_id;
      el.querySelector('.sess-meta').textContent = s.session_id + (s.task_count != null ? ' · ' + s.task_count + 't' : '');
      el.addEventListener('click', function () { switchSession(s.session_id); });
      panels.sess.appendChild(el);
    });
  }
  function renderFlows() {
    panels.flows.innerHTML = '';
    if (!workflows.length) { panels.flows.innerHTML = '<div class="side-empty">无 workflow</div>'; return; }
    workflows.forEach(function (w) {
      var el = document.createElement('div');
      el.className = 'cat-item';
      el.innerHTML = '<div class="row"><span class="job-label"></span><button type="button">武装</button></div><div class="meta"></div>';
      el.querySelector('.job-label').textContent = w.name + (state.armed && String(state.armed).indexOf(w.name) >= 0 ? ' ★' : '');
      el.querySelector('.meta').textContent = (w.kind || '') + ' · ' + (w.roles || []).join(', ');
      el.querySelector('button').addEventListener('click', function (e) {
        e.stopPropagation();
        armWorkflow(w.name);
      });
      panels.flows.appendChild(el);
    });
  }
  function renderSkills() {
    panels.skills.innerHTML = '';
    if (!skills.length) { panels.skills.innerHTML = '<div class="side-empty">无 skills</div>'; return; }
    skills.forEach(function (s) {
      var loaded = loadedSkills.indexOf(s.name) >= 0;
      var el = document.createElement('div');
      el.className = 'cat-item';
      el.innerHTML = '<div class="row"><span class="job-label"></span><button type="button"></button></div><div class="meta"></div>';
      el.querySelector('.job-label').textContent = (loaded ? '* ' : '') + s.name;
      el.querySelector('.meta').textContent = s.description || '';
      el.querySelector('button').textContent = loaded ? '已加载' : 'Load';
      el.querySelector('button').disabled = loaded;
      el.querySelector('button').addEventListener('click', function () { loadSkill(s.name); });
      panels.skills.appendChild(el);
    });
  }

  async function refreshCatalog() {
    if (!token) return;
    try {
      var cat = await api('/v1/catalog');
      if (cat.profiles) fillProfiles(cat.profiles);
      if (cat.models) fillModels(cat.models);
      if (cat.workflows) { workflows = cat.workflows; renderFlows(); }
      if (cat.skills) { skills = cat.skills; renderSkills(); }
      if (cat.loaded_skills) { loadedSkills = cat.loaded_skills; renderSkills(); }
      if (cat.llm) {
        if (cat.llm.model) state.model = cat.llm.model;
        if (cat.llm.profile) state.profile = cat.llm.profile;
        state.armed = cat.llm.armed_workflow || cat.armed_workflow || null;
      }
      if (cat.armed_workflow !== undefined) state.armed = cat.armed_workflow;
      updateStatus();
    } catch (e) { /* ignore */ }
  }

  async function armWorkflow(name) {
    try {
      var r = await api('/v1/workflows/arm', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ name: name })
      });
      state.armed = r.name || name;
      updateStatus();
      renderFlows();
      appendSystem('Workflow armed: ' + (r.name || name));
    } catch (e) { appendSystem('武装失败: ' + e.message); }
  }
  async function disarmWorkflow() {
    try {
      await api('/v1/workflows/arm', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ name: null })
      });
      state.armed = null;
      updateStatus();
      renderFlows();
      appendSystem('Workflow disarmed');
    } catch (e) { appendSystem('取消武装失败: ' + e.message); }
  }
  async function loadSkill(name) {
    try {
      var r = await api('/v1/skills/load', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ name: name })
      });
      loadedSkills = r.loaded || loadedSkills;
      renderSkills();
      appendSystem('Skill loaded: ' + name);
    } catch (e) { appendSystem('Load skill 失败: ' + e.message); }
  }
  async function switchSession(id) {
    if (!id || id === state.sessionId || running) return;
    try {
      var r = await api('/v1/sessions/' + encodeURIComponent(id) + '/switch', {
        method: 'POST', headers: authHeaders(), body: '{}'
      });
      state.sessionId = r.session_id || id;
      updateStatus();
      renderSessions();
      appendSystem('已切换会话 ' + state.sessionId);
    } catch (e) { appendSystem('切换失败: ' + e.message); }
  }

  async function postTask(text) {
    var body = { text: text };
    if (state.sessionId) body.session_id = state.sessionId;
    return api('/v1/task', { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
  }
  async function postCommand(line) {
    return api('/v1/command', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ line: line })
    });
  }
  async function postAbort() {
    await api('/v1/abort', { method: 'POST', headers: authHeaders(), body: '{}' });
  }

  function pushWfStep(step) {
    var prev = wfSteps[wfSteps.length - 1];
    if (prev && prev.status === 'running') prev.status = 'done';
    wfSteps.push({
      nodeId: step.nodeId, as: step.as, role: step.role,
      phase: step.phase, round: step.round, status: step.status || 'running'
    });
    renderWorkflowSteps();
  }

  function handleWsPayload(msg) {
    if (!msg || typeof msg !== 'object') return;
    if (msg.type === 'hello') {
      if (msg.model) state.model = msg.model;
      if (msg.profile) state.profile = msg.profile;
      if (msg.session_id) state.sessionId = msg.session_id;
      if (msg.armed_workflow !== undefined) state.armed = msg.armed_workflow;
      if (msg.loaded_skills) loadedSkills = msg.loaded_skills;
      running = !!msg.running;
      state.run = running ? 'running' : 'idle';
      if (msg.sessions) { sessions = msg.sessions; renderSessions(); }
      if (msg.jobs) {
        jobs.clear();
        msg.jobs.forEach(function (j) { jobs.set(j.id, j); });
        renderJobs();
      }
      updateStatus();
      return;
    }
    if (msg.type === 'run_state') {
      state.run = msg.state || 'idle';
      running = msg.state === 'running';
      if (msg.session_id) state.sessionId = msg.session_id;
      if (msg.model) state.model = msg.model;
      if (msg.state === 'idle' || msg.state === 'aborted' || msg.state === 'error') {
        finalizeAssistant();
        if (wfSteps.length) {
          var last = wfSteps[wfSteps.length - 1];
          if (last.status === 'running') last.status = msg.state === 'idle' ? 'done' : 'failed';
          renderWorkflowSteps();
        }
        // arm is one-shot on server; clear local armed hint after run
        if (msg.state === 'idle') { /* keep armed until next task consumes */ }
      }
      if (msg.state === 'error' && msg.detail) appendSystem('⚠ ' + msg.detail);
      if (msg.state === 'aborted') appendSystem('〔已中止〕');
      updateStatus();
      return;
    }
    if (msg.type === 'job') {
      jobs.set(msg.id, { id: msg.id, status: msg.status, label: msg.label });
      renderJobs();
      return;
    }
    if (msg.type === 'workflow_step') { pushWfStep(msg); return; }
    if (msg.type === 'workflow_handback') {
      appendSystem('handback · ' + msg.workflow + ' · ' + msg.reason + '\n' + (msg.detail || ''));
      return;
    }
    if (msg.type === 'workflow_armed') {
      state.armed = msg.name || msg.path;
      updateStatus();
      renderFlows();
      return;
    }
    if (msg.type === 'workflow_confirm') {
      if (msg.status === 'pending') {
        var summary = msg.summary || ('Run workflow "' + msg.workflow + '"?\nshell=' + msg.needs_shell + ' web=' + msg.needs_web);
        var ok = window.confirm(summary + '\n\n[OK = 运行 / Cancel = 取消]\n（与 TUI 相同：不可始终允许）');
        api('/v1/workflow/confirm', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ approved: !!ok })
        }).catch(function (e) { appendSystem('workflow confirm 失败: ' + e.message); });
      }
      return;
    }
    if (msg.type === 'llm') {
      if (msg.model) state.model = msg.model;
      if (msg.profile) state.profile = msg.profile;
      updateStatus();
      refreshCatalog();
      return;
    }
    if (msg.type === 'skills') {
      loadedSkills = msg.loaded || [];
      renderSkills();
      return;
    }
    if (msg.role === 'user') return;
    // Child spawn/job streams share the WS hub but use another session_id —
    // keep them out of the main timeline (job panel + system_notice only).
    var childStream =
      msg.source === 'job' ||
      msg.source === 'spawn' ||
      (msg.session_id && state.sessionId && msg.session_id !== state.sessionId);
    if (childStream && msg.role !== 'system_notice') {
      if (msg.source === 'job' && msg.source_id) {
        var jid = msg.source_id;
        var prev = jobs.get(jid) || { id: jid };
        jobs.set(jid, { id: jid, status: 'running', label: prev.label || jid.slice(0, 14) });
        renderJobs();
      }
      return;
    }
    if (msg.role === 'assistant') {
      if (msg.delta) appendToken(msg.delta);
      else if (msg.content) {
        // Stream path already has a bubble: rewrite body + seal once.
        // Old code finalized then appendMessage again → full reply shown twice.
        if (currentAssistant) {
          currentAssistant.raw = msg.content;
          if (currentAssistant.textEl) currentAssistant.textEl.textContent = msg.content;
          finalizeAssistant();
        } else {
          appendMessage('assistant', msg.content, true);
        }
      }
      return;
    }
    if (msg.role === 'tool') {
      showToolCall({ name: msg.tool_name || 'tool', args: { call_id: msg.call_id }, content: msg.content, result: msg.content });
      return;
    }
    if (msg.role === 'system_notice' && msg.content) appendSystem(msg.content);
  }

  function connectWs() {
    if (!token) { setConn(false, '缺少 token'); return; }
    if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/v1/ws?token=' + encodeURIComponent(token));
    setConn(false, '连接中…');
    ws.onopen = function () { reconnectMs = 1500; setConn(true, '已连接'); };
    ws.onclose = function () {
      setConn(false, '已断开 · 重连中');
      setTimeout(connectWs, reconnectMs);
      reconnectMs = Math.min(reconnectMs * 1.5, 10000);
    };
    ws.onerror = function () { setConn(false, 'WS 错误'); };
    ws.onmessage = function (ev) {
      try { handleWsPayload(JSON.parse(ev.data)); } catch (e) {}
    };
  }

  document.querySelectorAll('.side-tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.side-tab').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.side-panel').forEach(function (p) { p.classList.remove('active'); });
      tab.classList.add('active');
      var id = tab.getAttribute('data-tab');
      if (panels[id]) panels[id].classList.add('active');
    });
  });

  selProfile.addEventListener('change', function () {
    if (suppressLlmChange || running) return;
    api('/v1/llm/profile', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ name: selProfile.value })
    }).then(function (r) {
      appendSystem(r.message || ('profile → ' + selProfile.value));
      return refreshCatalog();
    }).catch(function (e) { appendSystem('profile 失败: ' + e.message); refreshCatalog(); });
  });
  selModel.addEventListener('change', function () {
    if (suppressLlmChange || running) return;
    api('/v1/llm/model', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ model: selModel.value })
    }).then(function (r) {
      appendSystem(r.message || ('model → ' + selModel.value));
      return refreshCatalog();
    }).catch(function (e) { appendSystem('model 失败: ' + e.message); refreshCatalog(); });
  });

  document.getElementById('btn-disarm').addEventListener('click', disarmWorkflow);
  abortBtn.addEventListener('click', function () {
    postAbort().catch(function (e) { appendSystem('中止失败: ' + e.message); });
  });

  async function handleSend() {
    var text = input.value.trim();
    if (!text || running || !token) return;
    input.value = '';
    autoResize();
    if (text.charAt(0) === '/') {
      appendSystem('› ' + text);
      try {
        var r = await postCommand(text);
        if (r.message) appendSystem(r.message);
        if (r.accepted) {
          running = true; state.run = 'running';
          if (text.indexOf('workflow') >= 0) { wfSteps = []; renderWorkflowSteps(); }
          updateStatus();
        }
        await refreshCatalog();
      } catch (e) {
        appendSystem('命令失败: ' + e.message);
      }
      return;
    }
    appendMessage('user', text, false);
    state.turn += 1;
    running = true;
    state.run = 'running';
    if (state.armed) { wfSteps = []; renderWorkflowSteps(); }
    updateStatus();
    try {
      var body = await postTask(text);
      if (body.session_id) state.sessionId = body.session_id;
      // armed is consumed by one-shot arm on server
      updateStatus();
    } catch (e) {
      running = false;
      state.run = 'error';
      updateStatus();
      appendSystem('发送失败: ' + e.message);
    }
  }

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });
  sendBtn.addEventListener('click', handleSend);
  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }
  input.addEventListener('input', autoResize);

  window.AgentUI = {
    appendMessage: function (role, c) { appendMessage(role, c, role === 'assistant'); },
    appendToken: appendToken,
    showToolCall: showToolCall,
    setJobStatus: function (id, status, label) {
      jobs.set(id, { id: id, status: status, label: label });
      renderJobs();
    }
  };

  renderWorkflowSteps();
  renderJobs();
  renderSessions();
  renderFlows();
  renderSkills();
  updateStatus();
  connectWs();
  refreshCatalog();
  fetch('/health').then(function (r) { return r.json(); }).then(function (h) {
    if (h.model) state.model = h.model;
    if (h.profile) state.profile = h.profile;
    if (h.session_id) state.sessionId = h.session_id;
    if (h.armed_workflow) state.armed = h.armed_workflow;
    if (h.running) { running = true; state.run = 'running'; }
    updateStatus();
  }).catch(function () {});
})();
</script>
</body>
</html>
